name: Version and Publish

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Type of version bump (used only when bump version and push tag is enabled)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      bump-and-tag:
        description: 'Bump package version, commit, push main, and push release tag'
        required: false
        default: true
        type: boolean
      update-dashboard:
        description: 'Trigger levante-dashboard repository dispatch'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task-launcher
    outputs:
      new_version: ${{ steps.resolve_version.outputs.new_version }}
    steps:
      - name: Generate GitHub App token
        id: checkout_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.LEVANTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.LEVANTE_BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.checkout_token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run check

      - name: Configure git
        if: ${{ inputs.bump-and-tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        if: ${{ inputs.bump-and-tag }}
        run: |
          npm version ${{ inputs.version-type }} --message "chore: release v%s [skip ci]"

      - name: Resolve version
        id: resolve_version
        run: echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Push version commit and tag
        if: ${{ inputs.bump-and-tag }}
        run: git push --follow-tags

      - name: Publish to npm
        if: ${{ inputs.bump-and-tag }}
        run: npm publish --access public

  update-dashboard:
    if: ${{ inputs.update-dashboard }}
    needs: version-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.LEVANTE_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.LEVANTE_BOT_APP_PRIVATE_KEY }}
          repositories: levante-dashboard

      - name: Trigger dashboard update
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repository: levante-framework/levante-dashboard
          event-type: update-core-tasks
          client-payload: '{"version": "${{ needs.version-and-publish.outputs.new_version }}"}'
